[Service]
# Final 5TB agent-search mode: do not return a green result until the full
# mounted shard set has been searched.
EnvironmentFile=
EnvironmentFile=/etc/v5-memo/env
EnvironmentFile=/etc/v5-memo/fullraw-effective.env
Environment=PYTHONPATH=/opt/v5-memo/src
TimeoutStopSec=120
TimeoutStopFailureMode=kill
KillMode=control-group
SendSIGKILL=yes
Environment=RESEARKA_FULLRAW_INDEX_PORT=9903
Environment=RESEARKA_FULLRAW_MIN_SHARDS_SEARCHED=1525
Environment=RESEARKA_FULLRAW_MIN_SOURCES_SEARCHED=5
Environment=RESEARKA_FULLRAW_REQUIRE_COMPLETE_SEARCH=1
Environment=RESEARKA_FULLRAW_SWEEP_REQUIRE_COMPLETE=1
Environment=RESEARKA_FULLRAW_SEARCH_ISOLATED=0
Environment=RESEARKA_FULLRAW_ASYNC_SWEEP=1
Environment=RESEARKA_FULLRAW_SHARD_CATALOG_PATH=/var/lib/v5-memo/fullraw-shard-catalog.json
Environment=RESEARKA_FULLRAW_SHARD_CATALOG_TTL_SECONDS=86400
Environment=RESEARKA_FULLRAW_SWEEP_SHARD_LIMIT=1525
Environment=RESEARKA_FULLRAW_SWEEP_PASS_SHARD_LIMIT=64
Environment=RESEARKA_FULLRAW_SEARCH_PREFIX_SHARDS=128
Environment=RESEARKA_FULLRAW_SWEEP_MAX_PASSES=5000
Environment=RESEARKA_FULLRAW_SWEEP_WORKERS=4
Environment=RESEARKA_FULLRAW_SWEEP_MAX_INFLIGHT=1
Environment=RESEARKA_FULLRAW_SWEEP_PRIORITY_BURST=1
Environment=RESEARKA_FULLRAW_SWEEP_MAX_QUEUE=16
Environment=RESEARKA_FULLRAW_SWEEP_TTL_SECONDS=604800
Environment=RESEARKA_FULLRAW_SWEEP_CACHE_DIR=/var/lib/v5-memo/fullraw-sweep-cache
Environment=RESEARKA_FULLRAW_FOREGROUND_SWEEP_WAIT_SECONDS=900
Environment=RESEARKA_FULLRAW_SWEEP_TIMEOUT_SECONDS=300
Environment=RESEARKA_FULLRAW_SWEEP_SHARD_TIMEOUT_SECONDS=20
Environment=RESEARKA_FULLRAW_SHARD_LOCAL_CACHE_DIR=/mnt/HC_Volume_106011525/v5-memo/fullraw-shard-cache-remote
Environment=RESEARKA_FULLRAW_SHARD_LOCAL_CACHE_MAX_BYTES=auto
