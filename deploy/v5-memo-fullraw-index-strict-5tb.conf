[Service]
# Agent-search mode: keep foreground queries bounded. Full-corpus coverage is
# represented by health/index receipts, not by forcing every memo query to scan
# every shard before returning.
EnvironmentFile=
EnvironmentFile=/etc/v5-memo/fullraw-effective.env
Environment=PYTHONPATH=/opt/v5-memo/src
Environment=V5_MEMO_FULL_RAW_SEARCH_SHARD_LIMIT=96
Environment=V5_MEMO_FULL_RAW_SEARCH_PREFIX_SHARDS=96
Environment=V5_MEMO_FULL_RAW_MIN_SHARDS_SEARCHED=1
Environment=V5_MEMO_FULL_RAW_MIN_SOURCES_SEARCHED=1
Environment=V5_MEMO_FULL_RAW_REQUIRE_COMPLETE_SEARCH=0
Environment=V5_MEMO_FULL_RAW_SWEEP_REQUIRE_COMPLETE=0
Environment=V5_MEMO_FULL_RAW_SEARCH_ISOLATED=1
Environment=V5_MEMO_FULL_RAW_ASYNC_SWEEP=1
Environment=V5_MEMO_FULL_RAW_SWEEP_SHARD_LIMIT=256
Environment=V5_MEMO_FULL_RAW_SWEEP_PASS_SHARD_LIMIT=128
Environment=V5_MEMO_FULL_RAW_SWEEP_MAX_PASSES=8
Environment=V5_MEMO_FULL_RAW_SWEEP_WORKERS=32
Environment=V5_MEMO_FULL_RAW_SWEEP_MAX_INFLIGHT=2
Environment=V5_MEMO_FULL_RAW_SWEEP_TIMEOUT_SECONDS=900
Environment=V5_MEMO_FULL_RAW_SWEEP_SHARD_TIMEOUT_SECONDS=60
Environment=V5_MEMO_FULL_RAW_SHARD_LOCAL_CACHE_DIR=
Environment=V5_MEMO_FULL_RAW_SHARD_LOCAL_CACHE_MAX_BYTES=0
