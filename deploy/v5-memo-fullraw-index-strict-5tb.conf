[Service]
# Final 5TB agent-search mode: do not return a green result until the full
# mounted shard set has been searched.
EnvironmentFile=
EnvironmentFile=/etc/v5-memo/env
EnvironmentFile=/etc/v5-memo/fullraw-effective.env
Environment=PYTHONPATH=/opt/v5-memo/src
TimeoutStopSec=120
TimeoutStopFailureMode=kill
KillMode=control-group
SendSIGKILL=yes
Environment=V5_MEMO_FULL_RAW_INDEX_PORT=9903
Environment=V5_MEMO_FULL_RAW_MIN_SHARDS_SEARCHED=1525
Environment=V5_MEMO_FULL_RAW_MIN_SOURCES_SEARCHED=5
Environment=V5_MEMO_FULL_RAW_REQUIRE_COMPLETE_SEARCH=1
Environment=V5_MEMO_FULL_RAW_SWEEP_REQUIRE_COMPLETE=1
Environment=V5_MEMO_FULL_RAW_SEARCH_ISOLATED=0
Environment=V5_MEMO_FULL_RAW_ASYNC_SWEEP=1
Environment=V5_MEMO_FULL_RAW_SHARD_CATALOG_PATH=/var/lib/v5-memo/fullraw-shard-catalog.json
Environment=V5_MEMO_FULL_RAW_SHARD_CATALOG_TTL_SECONDS=86400
Environment=V5_MEMO_FULL_RAW_SWEEP_SHARD_LIMIT=1525
Environment=V5_MEMO_FULL_RAW_SWEEP_PASS_SHARD_LIMIT=32
Environment=V5_MEMO_FULL_RAW_SEARCH_PREFIX_SHARDS=128
Environment=V5_MEMO_FULL_RAW_SWEEP_MAX_PASSES=5000
Environment=V5_MEMO_FULL_RAW_SWEEP_WORKERS=8
Environment=V5_MEMO_FULL_RAW_SWEEP_MAX_INFLIGHT=2
Environment=V5_MEMO_FULL_RAW_SWEEP_PRIORITY_BURST=1
Environment=V5_MEMO_FULL_RAW_SWEEP_TTL_SECONDS=604800
Environment=V5_MEMO_FULL_RAW_SWEEP_CACHE_DIR=/var/lib/v5-memo/fullraw-sweep-cache
Environment=V5_MEMO_FULL_RAW_FOREGROUND_SWEEP_WAIT_SECONDS=900
Environment=V5_MEMO_FULL_RAW_SWEEP_TIMEOUT_SECONDS=120
Environment=V5_MEMO_FULL_RAW_SWEEP_SHARD_TIMEOUT_SECONDS=20
Environment=V5_MEMO_FULL_RAW_SHARD_LOCAL_CACHE_DIR=/var/cache/v5-memo/fullraw-local-shard-cache
Environment=V5_MEMO_FULL_RAW_SHARD_LOCAL_CACHE_MAX_BYTES=25769803776
