[Unit]
Wants=network-online.target v5-memo-isolated-fullraw-search.service
After=network-online.target v5-memo-isolated-fullraw-search.service

[Service]
# Keep every V5 portfolio stage on the isolated V5 search lane even when
# shared-platform compatibility drop-ins are installed on the host.
Environment=RESEARKA_FULLRAW_SEARCH_URL=http://127.0.0.1:9915/search
Environment=RESEARKA_FULLRAW_INDEX_PORT=9915
Environment=V5_MEMO_FULL_RAW_CORPUS_SEARCH_URL=http://127.0.0.1:9915/search
Environment=V5_MEMO_FULL_RAW_INDEX_PORT=9915
